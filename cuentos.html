<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuentos Interactivos | El Niño</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="icon" type="image/png" href="./favicon.png" />
  </head>
  <body>
    <div id="app">
      <header class="page-header">
        <h1>Biblioteca de Cuentos Interactivos</h1>
        <p>Elige tu propia aventura. Cada decision cambia la historia.</p>
      </header>

      <main class="content">
        <div class="story-library" id="storyLibrary"></div>

        <section class="section">
          <h2>Estadisticas de lectura</h2>
          <div class="stats-grid" id="readingStats"></div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__grid">
          <div>
            <h3 class="footer__title">Plataforma El Niño</h3>
            <p class="footer__text">Biblioteca de cuentos interactivos para pequenos aventureros.</p>
          </div>
        </div>
        <div class="footer__bottom">
          <span>Desarrollado por Urukais Klick</span>
        </div>
      </footer>
    </div>

    <script type="module">
      import { renderStoryLibrary } from './src/js/ui/story-view.js';
      import { getReadingStats } from './src/js/services/story-engine.js';

      renderStoryLibrary(document.getElementById('storyLibrary'));

      const stats = getReadingStats();
      document.getElementById('readingStats').innerHTML = `
        <div class="stat-card"><span class="stat-card__value">${stats.storiesStarted}</span><span class="stat-card__label">Cuentos empezados</span></div>
        <div class="stat-card"><span class="stat-card__value">${stats.storiesCompleted}</span><span class="stat-card__label">Cuentos completados</span></div>
        <div class="stat-card"><span class="stat-card__value">${stats.totalXpEarned}</span><span class="stat-card__label">XP ganada</span></div>
        <div class="stat-card"><span class="stat-card__value">${Math.round(stats.quizAccuracy * 100)}%</span><span class="stat-card__label">Precision en quizzes</span></div>
      `;
    </script>
  </body>
</html>
