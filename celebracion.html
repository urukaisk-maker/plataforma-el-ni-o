<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00f5ff">
  <link rel="manifest" href="./manifest.json">
  <title>Celebración | El Niño</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <style>
    :root {
      --bg: #060814;
      --primary: #00f5ff;
      --accent: #ff2bd6;
      --gold: #ffd700;
      --text: #e8eaf6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: var(--bg);
      font-family: "Inter", sans-serif;
      color: var(--text);
      height: 100vh;
      width: 100vw;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #particlesCanvas { z-index: 1; }
    #fireworksCanvas { z-index: 2; pointer-events: none; }

    .celebration-stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
    }

    .celebration-stage > * { pointer-events: auto; }

    .celebration-message {
      font-family: "Orbitron", sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      opacity: 0;
      transform: scale(0.5);
      animation: messageAppear 2.5s ease-out forwards;
      text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
      margin: 8px 0;
      line-height: 1.1;
    }

    .celebration-message.gold { color: var(--gold); font-size: clamp(2rem, 7vw, 5rem); }
    .celebration-message.cyan { color: var(--primary); font-size: clamp(1.5rem, 5vw, 3.5rem); }
    .celebration-message.pink { color: var(--accent); font-size: clamp(1.2rem, 4vw, 2.5rem); }
    .celebration-message.white { color: #fff; font-size: clamp(1rem, 3vw, 1.8rem); }

    @keyframes messageAppear {
      0% { opacity: 0; transform: scale(0.3) translateY(40px); }
      30% { opacity: 1; transform: scale(1.1) translateY(-10px); }
      50% { transform: scale(1) translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
    }

    @keyframes messageStay {
      0% { opacity: 0; transform: scale(0.5); }
      30% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    .celebration-message.stay {
      animation: messageStay 1.5s ease-out forwards;
    }

    .celebration-controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .celebration-btn {
      padding: 14px 28px;
      border: 2px solid var(--primary);
      border-radius: 50px;
      background: rgba(0, 245, 255, 0.1);
      color: var(--primary);
      font-family: "Orbitron", sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .celebration-btn:hover {
      background: rgba(0, 245, 255, 0.25);
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
      transform: translateY(-2px);
    }

    .celebration-btn.secondary {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(255, 43, 214, 0.1);
    }

    .celebration-btn.secondary:hover {
      background: rgba(255, 43, 214, 0.25);
      box-shadow: 0 0 30px rgba(255, 43, 214, 0.4);
    }

    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--primary);
      animation: pulseRing 2s ease-out infinite;
      pointer-events: none;
    }

    @keyframes pulseRing {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 300px; height: 300px; opacity: 0; }
    }

    .emoji-rain {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
    }

    .emoji-drop {
      position: absolute;
      font-size: 1.8rem;
      animation: emojiFall linear forwards;
      opacity: 0.8;
    }

    @keyframes emojiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    .hud-stats {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hud-stat {
      padding: 10px 18px;
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 14px;
      background: rgba(6, 8, 20, 0.7);
      backdrop-filter: blur(10px);
      font-family: "Orbitron", sans-serif;
      font-size: 0.8rem;
      color: var(--primary);
    }

    .hud-stat strong {
      display: block;
      font-size: 1.3rem;
      color: var(--gold);
    }

    .audio-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(0, 245, 255, 0.35);
      border-radius: 50%;
      background: rgba(6, 8, 20, 0.7);
      color: var(--primary);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
    }

    .audio-toggle:hover {
      border-color: var(--primary);
      box-shadow: 0 0 16px rgba(0, 245, 255, 0.3);
    }

    .typing-cursor::after {
      content: "|";
      animation: blink 1s step-end infinite;
      color: var(--primary);
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <canvas id="particlesCanvas"></canvas>
  <canvas id="fireworksCanvas"></canvas>
  <div class="emoji-rain" id="emojiRain"></div>

  <div class="hud-stats">
    <div class="hud-stat">Nivel de fiesta<strong id="partyLevel">1</strong></div>
    <div class="hud-stat">Confeti lanzado<strong id="confettiCount">0</strong></div>
    <div class="hud-stat">Fuegos artificiales<strong id="fireworkCount">0</strong></div>
  </div>

  <button class="audio-toggle" id="audioToggle" title="Activar música">🔇</button>

  <div class="celebration-stage" id="celebrationStage"></div>

  <div class="celebration-controls">
    <button class="celebration-btn" id="moreFireworksBtn" type="button">Más fuegos</button>
    <button class="celebration-btn secondary" id="moreConfettiBtn" type="button">Más confeti</button>
    <a class="celebration-btn secondary" href="./final-epico.html">Volver al final</a>
  </div>

  <audio id="celebrationAudio" loop>
    <source src="./audio/video-fondo.mp3" type="audio/mp3">
  </audio>

  <script>
    /* === PARTÍCULAS DE FONDO === */
    const pCanvas = document.getElementById("particlesCanvas");
    const pCtx = pCanvas.getContext("2d");
    let pW, pH;
    const particles = [];
    const mouse = { x: null, y: null };

    function resizeParticles() {
      pW = pCanvas.width = window.innerWidth;
      pH = pCanvas.height = window.innerHeight;
    }
    resizeParticles();

    class Particle {
      constructor() {
        this.x = Math.random() * pW;
        this.y = Math.random() * pH;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.color = Math.random() > 0.5 ? "#00f5ff" : "#ff2bd6";
        this.alpha = Math.random() * 0.5 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (mouse.x != null) {
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            this.x -= dx * 0.02;
            this.y -= dy * 0.02;
          }
        }
        if (this.x < 0 || this.x > pW) this.speedX *= -1;
        if (this.y < 0 || this.y > pH) this.speedY *= -1;
      }
      draw() {
        pCtx.beginPath();
        pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        pCtx.fillStyle = this.color;
        pCtx.globalAlpha = this.alpha;
        pCtx.fill();
        pCtx.globalAlpha = 1;
      }
    }

    for (let i = 0; i < 150; i++) particles.push(new Particle());

    function animateParticles() {
      pCtx.clearRect(0, 0, pW, pH);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener("resize", resizeParticles);

    /* === FUEGOS ARTIFICIALES === */
    const fCanvas = document.getElementById("fireworksCanvas");
    const fCtx = fCanvas.getContext("2d");
    let fW, fH;
    const fireworks = [];
    const sparks = [];
    let fwCount = 0;

    function resizeFireworks() {
      fW = fCanvas.width = window.innerWidth;
      fH = fCanvas.height = window.innerHeight;
    }
    resizeFireworks();
    window.addEventListener("resize", resizeFireworks);

    class Firework {
      constructor(x, targetY, color) {
        this.x = x;
        this.y = fH;
        this.targetY = targetY;
        this.color = color;
        this.speed = 6 + Math.random() * 4;
        this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.2;
        this.dead = false;
      }
      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.speed *= 0.96;
        if (this.y <= this.targetY || this.speed < 1) {
          this.dead = true;
          explode(this.x, this.y, this.color);
        }
      }
      draw() {
        fCtx.beginPath();
        fCtx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        fCtx.fillStyle = this.color;
        fCtx.fill();
        fCtx.shadowBlur = 10;
        fCtx.shadowColor = this.color;
      }
    }

    class Spark {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.decay = Math.random() * 0.015 + 0.008;
        this.gravity = 0.08;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.vx *= 0.98;
        this.life -= this.decay;
      }
      draw() {
        if (this.life <= 0) return;
        fCtx.globalAlpha = this.life;
        fCtx.fillStyle = this.color;
        fCtx.beginPath();
        fCtx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
        fCtx.fill();
        fCtx.globalAlpha = 1;
      }
    }

    function explode(x, y, color) {
      for (let i = 0; i < 60; i++) sparks.push(new Spark(x, y, color));
      fwCount++;
      document.getElementById("fireworkCount").textContent = fwCount;
    }

    function launchFirework() {
      const colors = ["#00f5ff", "#ff2bd6", "#ffd700", "#ff4444", "#44ff44", "#ffffff", "#ff9500"];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const x = Math.random() * fW * 0.8 + fW * 0.1;
      const targetY = Math.random() * fH * 0.4 + fH * 0.1;
      fireworks.push(new Firework(x, targetY, color));
    }

    function animateFireworks() {
      fCtx.clearRect(0, 0, fW, fH);
      for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].draw();
        if (fireworks[i].dead) fireworks.splice(i, 1);
      }
      for (let i = sparks.length - 1; i >= 0; i--) {
        sparks[i].update();
        sparks[i].draw();
        if (sparks[i].life <= 0) sparks.splice(i, 1);
      }
      fCtx.shadowBlur = 0;
      requestAnimationFrame(animateFireworks);
    }
    animateFireworks();

    setInterval(launchFirework, 1800);

    /* === MENSAJES ANIMADOS === */
    const stage = document.getElementById("celebrationStage");
    const messages = [
      { text: "FELIZ CUMPLEAÑOS", cls: "gold", duration: 3000 },
      { text: "EL NIÑO", cls: "cyan", duration: 2500 },
      { text: "¡PARTIDA GANADA!", cls: "pink", duration: 2500 },
      { text: "NIVEL MÁXIMO DE FELICIDAD", cls: "white", duration: 2500 },
      { text: "CAMPEÓN DEL DÍA", cls: "gold", duration: 2500 },
      { text: "ESTE DÍA ES TUYO", cls: "pink", duration: 3000 },
      { text: "¡CELEBRA A LO GRANDE!", cls: "gold", duration: 4000 },
    ];

    let msgIndex = 0;
    let partyLevel = 1;
    let confettiTotal = 0;

    function showNextMessage() {
      stage.innerHTML = "";
      const m = messages[msgIndex % messages.length];
      const el = document.createElement("div");
      el.className = `celebration-message ${m.cls}`;
      el.textContent = m.text;
      stage.appendChild(el);
      msgIndex++;
      partyLevel++;
      document.getElementById("partyLevel").textContent = partyLevel;
      setTimeout(showNextMessage, m.duration);
    }
    showNextMessage();

    /* === CONFETI MEJORADO === */
    function launchEpicConfetti() {
      const colors = ["#00f5ff", "#ff2bd6", "#ffd700", "#ff4444", "#44ff44", "#ffffff"];
      const container = document.getElementById("emojiRain");
      for (let i = 0; i < 40; i++) {
        const el = document.createElement("div");
        el.className = "emoji-drop";
        el.textContent = ["🎉", "🎊", "✨", "🎂", "🎮", "⭐", "🎁", "🕹️", "🏆", "❤️"][Math.floor(Math.random() * 10)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.animationDuration = (Math.random() * 3 + 2) + "s";
        el.style.fontSize = (Math.random() * 1.5 + 1) + "rem";
        container.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }
      confettiTotal += 40;
      document.getElementById("confettiCount").textContent = confettiTotal;
    }

    setInterval(launchEpicConfetti, 2500);

    /* === CONTROLES === */
    document.getElementById("moreFireworksBtn").addEventListener("click", () => {
      for (let i = 0; i < 5; i++) setTimeout(launchFirework, i * 200);
    });

    document.getElementById("moreConfettiBtn").addEventListener("click", launchEpicConfetti);

    /* === AUDIO === */
    const audio = document.getElementById("celebrationAudio");
    const audioBtn = document.getElementById("audioToggle");
    let audioPlaying = false;

    audioBtn.addEventListener("click", () => {
      if (audioPlaying) {
        audio.pause();
        audioBtn.textContent = "🔇";
        audioBtn.title = "Activar música";
      } else {
        audio.play().catch(() => {});
        audioBtn.textContent = "🔊";
        audioBtn.title = "Pausar música";
      }
      audioPlaying = !audioPlaying;
    });

    /* === CLICS EN PANTALLA LANZAN FUEGOS === */
    window.addEventListener("click", e => {
      if (e.target.closest(".celebration-btn") || e.target.closest(".audio-toggle")) return;
      const colors = ["#00f5ff", "#ff2bd6", "#ffd700", "#ff4444"];
      const color = colors[Math.floor(Math.random() * colors.length)];
      explode(e.clientX, e.clientY, color);
    });
  </script>
</body>
</html>
